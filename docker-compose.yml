services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - JAVA_HOME=/opt/java/openjdk
      - OR_JAR_PATH=/opt/OpenRocket-23.09.jar

  frontend:
    image: node:20-slim
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    environment:
      - API_TARGET=http://backend:8000
    depends_on:
      - backend
    command: sh -c "npm install && npm run dev -- --host"
